events {}

http {
    server {
        listen 80;

        location /app/ai-thread/ {
            proxy_pass http://ai-thread:80/app/ai-thread/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /app/dashboard/ {
            proxy_pass http://dashboard:80/app/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
