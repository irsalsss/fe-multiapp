version: '3.8'

services:
  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-thread
      - me

  ai-thread:
    build:
      context: .
      dockerfile: apps/ai-thread/Dockerfile
    expose:
      - "80"

  me:
    build:
      context: .
      dockerfile: apps/me/Dockerfile
    expose:
      - "80"
