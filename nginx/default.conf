server {
    listen 80;

    # AI Thread App
    location /ai-thread/ {
        alias /usr/share/nginx/html/ai-thread/;
        index index.html;
        try_files $uri $uri/ /ai-thread/index.html;
    }

    # Dashboard App (Future placeholder/ready)
    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Static assets fallback
    location /assets/ {
        root /usr/share/nginx/html/;
    }

    # Root redirect to ai-thread as default
    location = / {
        return 301 /ai-thread/;
    }

    # Error handling
    error_page 404 /ai-thread/index.html;
}
