server {
    listen 80;
    root /usr/share/nginx/html;

    absolute_redirect off;

    # AI Thread App
    location /app/ai-thread {
        try_files $uri /app/ai-thread/index.html;
    }

    # Dashboard App (Future placeholder/ready)
    location /app/dashboard {
        try_files $uri /app/dashboard/index.html;
    }

    # Me App
    location /app/me {
        try_files $uri /app/me/index.html;
    }

    # Root redirect to ai-thread as default
    location = / {
        return 301 /app/ai-thread;
    }

    # Error handling
    error_page 404 /app/ai-thread/index.html;
}
