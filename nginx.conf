events {}

http {
    server {
        listen 80;

        location /ai-thread/ {
            proxy_pass http://ai-thread:80/ai-thread/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Future Dashboard location
        # location /app/dashboard/ {
        #     proxy_pass http://dashboard:80/app/dashboard/;
        # }
    }
}
